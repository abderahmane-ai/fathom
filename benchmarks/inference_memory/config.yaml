seed: 42
modes:
  - standard
  - recurrent_residual
  - vega
  - block_attnres
  - hyper_connection

model:
  residual_mode: standard
  d_model: 512
  n_heads: 8
  ff_dim: 2048
  num_layers: 12
  max_seq_len: 1024
  vocab_size: 1024
  dropout: 0.0
  recurrent_residual:
    read_gate_bias: -3.0
    forget_gate_bias: 3.0
    update_gate_bias: -2.0
    damp_gate_bias: 3.0
    gate_init_std: 0.01
    memory_gain_init: 0.0
    eps: 1.0e-5
  vega:
    rank: 32
    n_heads: 4
    n_fast_heads: 2
    read_gate_bias: -3.0
    write_gate_bias: -2.0
    damp_gate_bias: 3.0
    gate_init_std: 0.01
    eps: 1.0e-5
  attnres_block:
    block_size: 2
  hyper_connection:
    num_channels: 2
    use_static_input: false
    init_static_gate: 0.0

benchmark:
  task: inference_memory
