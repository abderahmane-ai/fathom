seed: 42
modes:
  - standard
  - recurrent_residual
  - vega
  - block_attnres

model:
  residual_mode: standard
  d_model: 512
  n_heads: 8
  ff_dim: 2048
  num_layers: 6
  max_seq_len: 128
  vocab_size: 50257
  dropout: 0.1
  recurrent_residual:
    read_gate_bias: -3.0
    forget_gate_bias: 3.0
    update_gate_bias: -2.0
    damp_gate_bias: 3.0
    gate_init_std: 0.01
    memory_gain_init: 0.0
    eps: 1.0e-5
  vega:
    rank: 16
    n_heads: 4
    n_fast_heads: 2
    read_gate_bias: -3.0
    write_gate_bias: -2.0
    damp_gate_bias: 3.0
    gate_init_std: 0.01
    eps: 1.0e-5
  attnres_block:
    block_size: 2  # each layer is its own block
  hyper_connection:
    num_channels: 2
    use_static_input: false
    init_static_gate: 0.0

sweep:
  - d_model: 384
    n_heads: 6
    ff_dim: 1536
    num_layers: 8
  - d_model: 512
    n_heads: 8
    ff_dim: 2048
    num_layers: 6
  - d_model: 640
    n_heads: 10
    ff_dim: 2560
    num_layers: 4

data:
  dataset_name: roneneldan/TinyStories
  dataset_config: default
  tokenizer_name: gpt2
  max_seq_len: 128
  batch_size: 96
  num_workers: 4
  tokenization_num_proc: 4
  packed_cache_dir: null
  train_split: train[:1%]
  val_split: validation[:1%]
  test_split: validation[:1%]

trainer:
  precision: bf16-mixed
  accelerator: gpu
  devices: 1
  strategy: auto
  max_epochs: -1
  matmul_precision: high
  gradient_clip_val: 1.0
  scheduler:
    warmup_steps: 200
    min_lr_ratio: 0.1
  optimizer:
    lr: 4.0e-4
    weight_decay: 0.1
    betas: [0.9, 0.95]

benchmark:
  task: lm
  max_params: 60000000
  max_steps: 1500
  estimated_train_batches: 287
  val_check_interval: 300
  checkpoint_every_n_steps: 500
  status_every_n_steps: 100
  log_every_n_steps: 25
  save_top_k: 1
  resume: true

wandb:
  enabled: false
  project: fathom
