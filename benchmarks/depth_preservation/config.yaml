seed: 42
modes:
  - standard
  - recurrent_residual
  - block_attnres

model:
  residual_mode: standard
  d_model: 512
  n_heads: 8
  ff_dim: 2048
  num_layers: 24
  max_seq_len: 256
  vocab_size: 50257
  dropout: 0.1
  recurrent_residual:
    read_gate_bias: -3.0
    update_gate_bias: -2.0
    gate_init_std: 0.01
    memory_gain_init: 0.0
    eps: 1.0e-5
  attnres_block:
    block_size: 2  # 12 layers × 2 sublayers / 2 = 12 blocks → paper recommends ~8

data:
  dataset_name: roneneldan/TinyStories
  dataset_config: default
  tokenizer_name: gpt2
  max_seq_len: 256
  batch_size: 16
  num_workers: 4
  tokenization_num_proc: 4
  packed_cache_dir: null
  train_split: train[:1%]
  val_split: validation[:1%]
  test_split: validation[:1%]

benchmark:
  task: dps
  n_tokens: 100000
  lambda_val: 1.0
  target_layer_idx: 1
  final_norm_name: ln_f
