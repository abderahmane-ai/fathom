seed: 42
modes:
  - standard
  - recurrent_residual
  - swda_lr
  - block_attnres
  - full_attnres

model:
  residual_mode: standard
  d_model: 256
  n_heads: 8
  ff_dim: 1024
  num_layers: 12
  max_seq_len: 512
  vocab_size: 64
  dropout: 0.0
  recurrent_residual:
    read_gate_bias: -3.0
    update_gate_bias: -2.0
    gate_init_std: 0.01
    memory_gain_init: 0.0
    eps: 1.0e-5
  swda_lr:
    window_size: 8
    rank: 16
    decay_bias_init: 3.0
    read_gate_bias: -3.0
    gate_init_std: 0.01
    eps: 1.0e-5
  attnres_block:
    block_size: 2  # 12 layers × 2 sublayers / 2 = 12 blocks → paper recommends ~8
  full_attnres:
    max_layers: 24

data:
  max_seq_len: 512
  vocab_size: 64
  start_token: 0
  blank_token: 0
  output_token: 63
  batch_size: 64
  num_workers: 2
  n_eval: 1000

trainer:
  precision: bf16-mixed
  accelerator: gpu
  devices: 1
  strategy: auto
  max_epochs: -1
  matmul_precision: high
  gradient_clip_val: 1.0
  scheduler:
    warmup_steps: 200
    min_lr_ratio: 0.1
  optimizer:
    lr: 5.0e-4
    weight_decay: 0.05
    betas: [0.9, 0.95]

benchmark:
  task: depth_needle
  max_params: 60000000
  max_steps: 3000
  estimated_train_batches: 1000
  val_check_interval: 250
  checkpoint_every_n_steps: 500
  status_every_n_steps: 100
  log_every_n_steps: 25
  save_top_k: 2
  resume: true

wandb:
  enabled: false
  project: recurrent-residuals
