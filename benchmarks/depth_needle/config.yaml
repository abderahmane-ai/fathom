seed: 42
modes:
  - standard
  - recurrent_residual
  - vega
  - block_attnres
  - full_attnres

model:
  residual_mode: standard
  d_model: 256
  n_heads: 8
  ff_dim: 1024
  num_layers: 12
  max_seq_len: 512
  vocab_size: 64
  dropout: 0.0
  recurrent_residual:
    read_gate_bias: -3.0
    forget_gate_bias: 3.0
    update_gate_bias: -2.0
    damp_gate_bias: 3.0
    gate_init_std: 0.01
    memory_gain_init: 0.0
    eps: 1.0e-5
  vega:
    rank: 16
    n_heads: 4
    n_fast_heads: 2
    read_gate_bias: -3.0
    write_gate_bias: -2.0
    damp_gate_bias: 3.0
    gate_init_std: 0.01
    eps: 1.0e-5
  attnres_block:
    block_size: 2  # 12 layers → 12 blocks
  full_attnres:
    max_layers: 24
  hyper_connection:
    num_channels: 2
    use_static_input: false
    init_static_gate: 0.0

data:
  max_seq_len: 512
  vocab_size: 64
  start_token: 1    # position 0 marker — must differ from blank_token (0) and output_token (63)
  blank_token: 0    # filler for all non-special positions
  output_token: 63  # position seq_len-1 marker that triggers the model to emit the payload
  # payload tokens are sampled from [2, 62] — strictly distinct from all three markers above
  batch_size: 64
  num_workers: 2
  n_eval: 1000

trainer:
  precision: bf16-mixed
  accelerator: gpu
  devices: 1
  strategy: auto
  max_epochs: -1
  matmul_precision: high
  gradient_clip_val: 1.0
  scheduler:
    warmup_steps: 200
    min_lr_ratio: 0.1
  optimizer:
    lr: 5.0e-4
    weight_decay: 0.05
    betas: [0.9, 0.95]

benchmark:
  task: depth_needle
  max_params: 60000000
  max_steps: 3000
  estimated_train_batches: 1000
  val_check_interval: 250
  checkpoint_every_n_steps: 500
  status_every_n_steps: 100
  log_every_n_steps: 25
  save_top_k: 2
  resume: true

wandb:
  enabled: false
  project: fathom
