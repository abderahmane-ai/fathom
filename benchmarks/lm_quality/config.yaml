seed: 42
modes:
  - standard
  - recurrent_residual
  - swda_lr
  - block_attnres

model:
  residual_mode: standard
  d_model: 192
  n_heads: 6
  ff_dim: 768
  num_layers: 24
  max_seq_len: 128
  vocab_size: 50257
  dropout: 0.1
  recurrent_residual:
    read_gate_bias: -3.0
    update_gate_bias: -2.0
    gate_init_std: 0.01
    memory_gain_init: 0.0
    eps: 1.0e-5
  swda_lr:
    window_size: 8
    rank: 16
    n_heads: 4
    decay_bias_init: 3.0
    read_gate_bias: -3.0
    gate_init_std: 0.01
    eps: 1.0e-5
  attnres_block:
    block_size: 2  # 6 layers × 2 sublayers / 2 = 6 blocks → matches paper's ~8 blocks

data:
  dataset_name: roneneldan/TinyStories
  dataset_config: default
  tokenizer_name: gpt2
  max_seq_len: 128
  batch_size: 128
  num_workers: 4
  tokenization_num_proc: 4
  packed_cache_dir: null
  train_split: train[:1%]
  val_split: validation[:1%]
  test_split: validation[:1%]

trainer:
  precision: bf16-mixed
  accelerator: gpu
  devices: 1
  strategy: auto
  max_epochs: -1
  matmul_precision: high
  gradient_clip_val: 1.0
  scheduler:
    warmup_steps: 200
    min_lr_ratio: 0.1
  optimizer:
    lr: 1.0e-3
    weight_decay: 0.1
    betas: [0.9, 0.95]

benchmark:
  task: lm
  max_params: 60000000
  max_steps: 4000
  estimated_train_batches: 287
  val_check_interval: 500
  checkpoint_every_n_steps: 500
  status_every_n_steps: 100
  log_every_n_steps: 50
  save_top_k: 2
  resume: true

wandb:
  enabled: false
  project: recurrent-residuals
