# conf/trainer/default.yaml
# @package trainer

max_epochs: 1                  # one pass through TinyStories 5% ~= 240M tokens
precision: bf16-mixed
accumulate_grad_batches: 1     # batch_size=96 already large
gradient_clip_val: 1.0
log_every_n_steps: 50
val_check_interval: 500        # validate every 500 steps
accelerator: auto
devices: auto
strategy: auto
num_nodes: 1

logger:
  name: csv
  project: recurrent-residuals
  save_dir: logs
  offline: false

optimizer:
  name: adamw
  lr: 6.0e-4                   # higher LR for deeper model (48 layers)
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: cosine
  warmup_steps: 500
  min_lr_ratio: 0.1
