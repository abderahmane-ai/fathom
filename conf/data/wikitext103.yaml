# conf/data/wikitext103.yaml — TinyStories data config
#
# TinyStories trains faster than WikiText-103 and gives meaningful
# perplexity comparisons at small scale.
# @package data

dataset_name: roneneldan/TinyStories
dataset_config: default
tokenizer_name: gpt2
max_seq_len: 128
batch_size: 96
num_workers: 4
tokenization_num_proc: 4
packed_cache_dir: null
train_split: train[:5%]
val_split: validation[:5%]
test_split: validation[:5%]
