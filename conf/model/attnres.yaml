# conf/model/attnres.yaml — Block Attention Residuals transformer, depth-scaled
#
# 48 layers, d_model=256 → 53.9M params.
# BlockAttnRes is O(L²) memory; use small block_size at depth.
# @package model

residual_mode: block_attnres

d_model: 256
n_heads: 8
ff_dim: 768
num_layers: 48
max_seq_len: 128
vocab_size: 50257
dropout: 0.1

attnres_block:
  block_size: 2
