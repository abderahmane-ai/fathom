# conf/model/attnres.yaml — Block Attention Residuals transformer
# @package model

residual_mode: block_attnres

d_model: 768
n_heads: 12
ff_dim: 3072
num_layers: 12
max_seq_len: 1024
vocab_size: 50257
dropout: 0.1

attnres_block:
  # Number of sublayers per block (attention + FFN = 2 per transformer layer).
  # block_size: 2 = 1 layer per block → ~8 blocks for 8-layer model
  block_size: 2
