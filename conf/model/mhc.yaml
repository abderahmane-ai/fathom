# conf/model/mhc.yaml — mHC-Lite hyper-connection transformer
# @package model

residual_mode: hyper_connection

hyper_connection:
  num_channels: 2         # m = 2 (mHC-Lite)
  use_static_input: false
  init_static_gate: 0.0   # ignored when use_static_input is false

d_model: 768
n_heads: 12
ff_dim: 3072
num_layers: 12
max_seq_len: 1024
vocab_size: 50257
dropout: 0.1
