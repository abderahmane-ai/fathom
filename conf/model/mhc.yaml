# conf/model/mhc.yaml — Original DeepSeek mHC with Sinkhorn-Knopp, depth-scaled
#
# Reference: Xie, Z. et al., "mHC: Manifold-Constrained Hyper-Connections",
#            arXiv:2512.24880, 2025 (Eq. 19: H_res = SK(exp(...)), 20 iters).
#
# 48 layers, d_model=256, n=2 → 53.9M params (+ mHC overhead ~0.2%).
# @package model

residual_mode: hyper_connection

d_model: 256
n_heads: 8
ff_dim: 768
num_layers: 48
max_seq_len: 128
vocab_size: 50257
dropout: 0.1

hyper_connection:
  num_channels: 2
  algorithm: sinkhorn_knopp
  t_max: 20
  use_static_input: false
  init_static_gate: 0.0
