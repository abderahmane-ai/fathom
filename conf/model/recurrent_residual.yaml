# conf/model/recurrent_residual.yaml — gated-memory residual transformer
# @package model

residual_mode: recurrent_residual

recurrent_residual:
  read_gate_bias: -3.0
  forget_gate_bias: 3.0
  update_gate_bias: -2.0
  gate_init_std: 0.01
  memory_gain_init: 0.0001
  eps: 1e-5

d_model: 768
n_heads: 12
ff_dim: 3072
num_layers: 12
max_seq_len: 1024
vocab_size: 50257
dropout: 0.1
