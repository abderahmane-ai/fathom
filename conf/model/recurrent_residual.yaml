# conf/model/recurrent_residual.yaml — RR gated-memory transformer
# @package model

residual_mode: recurrent_residual

recurrent_residual:
  read_gate_bias: -3.0    # gate starts ~closed (σ(-3) ≈ 0.047)
  forget_gate_bias: 3.0   # gate starts highly retentive (σ(3) ≈ 0.952)
  update_gate_bias: -2.0  # gate starts conservative (σ(-2) ≈ 0.119)
  damp_gate_bias: 3.0     # damp gate starts ~1 (h_prev mostly kept)
  gate_init_std: 0.01
  memory_gain_init: 0.0     # zero-start: memory read is gated off at init
  eps: 1e-5

d_model: 768
n_heads: 12
ff_dim: 3072
num_layers: 12
max_seq_len: 1024
vocab_size: 50257
dropout: 0.1
